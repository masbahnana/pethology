name: Cypress E2E Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  cypress-run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Start static server
        run: npx serve . --listen 5500 &
        # Serves the project at localhost:5500 (matches cypress.config.js baseUrl)

      - name: Wait for server
        run: npx wait-on http://localhost:5500 --timeout 30000

      - name: Run Cypress tests
        uses: cypress-io/github-action@v6
        with:
          install: false
          browser: chrome
          headed: false
        env:
          CYPRESS_studentEmail: ${{ secrets.CYPRESS_STUDENT_EMAIL }}
          CYPRESS_teacherEmail: ${{ secrets.CYPRESS_TEACHER_EMAIL }}

      - name: Upload screenshots on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: cypress-screenshots
          path: cypress/screenshots
          retention-days: 7

      - name: Upload videos
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: cypress-videos
          path: cypress/videos
          retention-days: 7
