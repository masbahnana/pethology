<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Contact Us - Pethology</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/public.css">
  <style>
    main {
      max-width: 780px;
      margin: 80px auto;
      padding: 0 30px;
    }

    h1 {
      font-size: 3rem;
      margin-bottom: 0.3em;
      letter-spacing: -1px;
    }

    .form-container {
      background: white;
      padding: 32px;
      border-radius: 12px;
      border: 1px solid #e8e8e8;
    }

    .form-container label {
      display: block;
      margin-bottom: 6px;
      font-weight: 500;
      font-size: 0.95rem;
      color: #111;
    }

    .form-container input,
    .form-container textarea {
      width: 100%;
      padding: 12px 16px;
      margin-bottom: 20px;
      border: 1.5px solid #e8e8e8;
      border-radius: 8px;
      font-size: 1rem;
      color: #111;
      font-family: inherit;
      transition: border-color 0.2s ease;
    }

    .form-container input:focus,
    .form-container textarea:focus {
      outline: none;
      border-color: #16a34a;
    }

    .form-container button {
      width: 100%;
      padding: 14px;
      background-color: #16a34a;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background-color 0.2s ease;
    }

    .form-container button:hover {
      background-color: #15803d;
    }

    @media (max-width: 768px) {
      main {
        margin: 40px auto;
        padding: 0 20px;
      }

      h1 {
        font-size: 2.2rem;
      }
    }
  </style>
</head>
<body>

  <nav class="pub-nav">
    <a href="index.html" class="nav-logo">
      <img src="assets/img/pethology-logo.jpg" alt="Pethology">
      Pethology
    </a>
    <div class="nav-links">
      <a href="about.html">About</a>
      <a href="faq.html">FAQ</a>
      <a href="store.html">🛍️ Store</a>
      <a href="auth0-login.html" class="btn btn-green">🐾 Log in</a>
    </div>
  </nav>

  <main>
    <h1>Contact Us</h1>

    <section class="form-container">
      <h2>We'd Love to Hear from You</h2>
      <p>If you have any questions or feedback, feel free to reach out to us. We're here to help!</p>

      <form action="submit_form.php" method="POST">
        <label for="name">Your Name</label>
        <input type="text" id="name" name="name" placeholder="Your full name" required />

        <label for="email">Your Email</label>
        <input type="email" id="email" name="email" placeholder="Your email address" required />

        <label for="message">Your Message</label>
        <textarea id="message" name="message" placeholder="Write your message here..." rows="5" required></textarea>

        <button type="submit">Send Message</button>
      </form>
    </section>
  </main>

  <footer class="pub-footer">
    <span>© 2026 Pethology — Built with ❤️ for Animal Care students</span>
    <div class="footer-links">
      <a href="about.html">About</a>
      <a href="faq.html">FAQ</a>
      <a href="store.html">Store</a>
      <a href="contact.html">Contact</a>
      <a href="support.html">Support us</a>
    </div>
  </footer>
</body>
</html>
